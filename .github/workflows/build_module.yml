name: Build and Sign Module
on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { java-version: '17', distribution: 'temurin', cache: gradle }
      
      - name: Build & Verify
        run: |
          chmod +x gradlew increment_version.sh
          ./increment_version.sh ${{ github.ref_name }}
          ./gradlew assembleRelease
          
          # Manually fixed shell variables
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
          FILE_SIZE=$(du -k "$APK_PATH" | cut -f1)
          
          # Find this line in your build_module.yml
          if [ "$FILE_SIZE" -gt 5120 ]; then 
            echo "APK too large: ${FILE_SIZE}KB"
            exit 1
          fi

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ${{ steps.sign_app.outputs.signedReleaseFile }}
            HyperOS_Module.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
