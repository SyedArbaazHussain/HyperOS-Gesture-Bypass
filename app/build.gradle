apply plugin: 'com.android.application'
// If you use Kotlin in your project, also add:
// apply plugin: 'kotlin-android' 

android {
    namespace 'com.arbaaz.hyperos.gesture.bypass'
    compileSdk 34
    
    defaultConfig {
        applicationId "com.arbaaz.hyperos.gesture.bypass"
        minSdk 31
        targetSdk 34
        versionCode 1
        versionName "1.0"
        
        ndk { 
            abiFilters "arm64-v8a" 
        }
    }

    buildTypes {
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

dependencies {
    compileOnly 'org.lsposed.lsposed:api:1.0.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
}