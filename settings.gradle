pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}
dependencyResolutionManagement {
    // PREFER_SETTINGS ensures all modules use these central repositories
    repositoriesMode.set(RepositoriesMode.PREFER_SETTINGS) 
    repositories {
        google()
        mavenCentral()
        // Essential: This is where the LSPosed API lives
        maven { url 'https://api.xposed.info/' }
        // Backup: Some newer builds use JitPack
        maven { url 'https://jitpack.io' }
    }
}
rootProject.name = "HyperOS-Gesture-Bypass"
include ':app'